version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shorts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @shorts/api dev"
    volumes:
      - ./:/workspace
    env_file:
      - .env.example
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @shorts/web dev"
    volumes:
      - ./:/workspace
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
